<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Input Pembayaran</title>

<style>

body{
font-family:Segoe UI;
background:#0f172a;
color:white;
margin:0;
padding:15px;
}

.container{
max-width:400px;
margin:auto;
background:#1e293b;
padding:20px;
border-radius:12px;
}

h2{
text-align:center;
margin-bottom:20px;
}

.form-group{
margin-bottom:15px;
}

label{
display:block;
margin-bottom:5px;
font-size:14px;
}

select, input{
width:100%;
padding:10px;
border-radius:8px;
border:none;
font-size:14px;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:8px;
background:#22c55e;
color:white;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#16a34a;
}

#status{
text-align:center;
margin-top:10px;
}

</style>

</head>
<body>

<div class="container">

<h2>Input Pembayaran</h2>

<div class="form-group">
<label>Nama Siswa</label>
<select id="nama">
<option>Loading data siswa...</option>
</select>
</div>

<div class="form-group">
<label>Bayar Galon</label>
<input type="number" id="galon" placeholder="Masukkan jumlah">
</div>

<div class="form-group">
<label>Bayar Kartu Pelajar</label>
<input type="number" id="kartu" placeholder="Masukkan jumlah">
</div>

<div class="form-group">
<label>Iuran KAS</label>
<input type="number" id="kas" placeholder="Masukkan jumlah">
</div>

<button onclick="kirim()">Simpan</button>

<div id="status"></div>

</div>

<script>

const URL = "https://script.google.com/macros/s/AKfycbwQ0v3rev6JV1ubaV6E2aGNgN7Ji4uuQxAcs4xsBSuWGKwEsPftfYhwNKf6aY9KYlRkVw/exec";

// LOAD DATA SISWA
async function loadSiswa(){

  const select = document.getElementById("nama");
  select.innerHTML = "<option>Loading...</option>";

  try {

    const response = await fetch(URL + "?t=" + Date.now());
    const data = await response.json();

    console.log("DATA SISWA:", data);

    select.innerHTML = '<option value="">-- Pilih Siswa --</option>';

    if (!Array.isArray(data)) {
      select.innerHTML = "<option>❌ Data tidak valid</option>";
      return;
    }

    data.forEach(nama => {
      const option = document.createElement("option");
      option.value = nama;
      option.textContent = nama;
      select.appendChild(option);
    });

  } catch (error) {

    console.log("ERROR:", error);
    select.innerHTML = "<option>❌ Gagal load data</option>";

  }
}

// KIRIM DATA
function kirim(){

  const nama = document.getElementById("nama").value;
  const galon = document.getElementById("galon").value;
  const kartu = document.getElementById("kartu").value;
  const kas = document.getElementById("kas").value;

  if(!nama){
    alert("Pilih siswa dulu!");
    return;
  }

  let promises = [];

  if(galon){
    promises.push(fetch(URL,{
      method:"POST",
      body: JSON.stringify({
        nama:nama,
        jenis:"GALON",
        jumlah:galon
      })
    }));
  }

  if(kartu){
    promises.push(fetch(URL,{
      method:"POST",
      body: JSON.stringify({
        nama:nama,
        jenis:"KARTU_PELAJAR",
        jumlah:kartu
      })
    }));
  }

  if(kas){
    promises.push(fetch(URL,{
      method:"POST",
      body: JSON.stringify({
        nama:nama,
        jenis:"KAS_KELAS",
        jumlah:kas
      })
    }));
  }

  Promise.all(promises)
  .then(()=>{
    document.getElementById("status").innerText = "✅ Data berhasil disimpan";

    document.getElementById("galon").value="";
    document.getElementById("kartu").value="";
    document.getElementById("kas").value="";
  })
  .catch(()=>{
    document.getElementById("status").innerText = "❌ Gagal simpan";
  });

}

// JALANKAN
window.onload = loadSiswa;

</script>

</body>
</html>
