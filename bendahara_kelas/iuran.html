<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Input Pembayaran</title>

<style>

body{
font-family:Segoe UI;
background:#0f172a;
color:white;
margin:0;
padding:15px;
}

/* CONTAINER */
.container{
max-width:400px;
margin:auto;
background:#1e293b;
padding:20px;
border-radius:12px;
}

/* JUDUL */
h2{
text-align:center;
margin-bottom:20px;
}

/* FORM GROUP */
.form-group{
margin-bottom:15px;
}

/* LABEL */
label{
display:block;
margin-bottom:5px;
font-size:14px;
}

/* INPUT */
select, input{
width:100%;
padding:10px;
border-radius:8px;
border:none;
font-size:14px;
}

/* BUTTON */
button{
width:100%;
padding:12px;
border:none;
border-radius:8px;
background:#22c55e;
color:white;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#16a34a;
}

/* STATUS */
#status{
text-align:center;
margin-top:10px;
}

</style>

</head>
<body>

<div class="container">

<h2>Input Pembayaran</h2>

<!-- 1 -->
<div class="form-group">
<label>Nama Siswa</label>
<select id="nama"></select>
</div>

<!-- 2 -->
<div class="form-group">
<label>Bayar Galon</label>
<input type="number" id="galon" placeholder="Masukkan jumlah">
</div>

<!-- 3 -->
<div class="form-group">
<label>Bayar Kartu Pelajar</label>
<input type="number" id="kartu" placeholder="Masukkan jumlah">
</div>

<!-- 4 -->
<div class="form-group">
<label>Iuran KAS</label>
<input type="number" id="kas" placeholder="Masukkan jumlah">
</div>

<button onclick="kirim()">Simpan</button>

<div id="status"></div>

</div>

<script>

const URL = "PASTE_URL_WEB_APP_KAMU";

// LOAD DATA SISWA
window.onload = function(){

fetch(URL)
.then(res => res.json())
.then(data => {

  const select = document.getElementById("nama");
  select.innerHTML = '<option value="">-- Pilih Siswa --</option>';

  data.forEach(nama => {
    let opt = document.createElement("option");
    opt.value = nama;
    opt.textContent = nama;
    select.appendChild(opt);
  });

});

}


// KIRIM DATA
function kirim(){

const nama = document.getElementById("nama").value;
const galon = document.getElementById("galon").value;
const kartu = document.getElementById("kartu").value;
const kas = document.getElementById("kas").value;

if(!nama){
  alert("Pilih siswa dulu!");
  return;
}

let promises = [];

// GALON
if(galon){
  promises.push(fetch(URL,{
    method:"POST",
    body: JSON.stringify({
      nama:nama,
      jenis:"GALON",
      jumlah:galon
    })
  }));
}

// KARTU
if(kartu){
  promises.push(fetch(URL,{
    method:"POST",
    body: JSON.stringify({
      nama:nama,
      jenis:"KARTU_PELAJAR",
      jumlah:kartu
    })
  }));
}

// KAS
if(kas){
  promises.push(fetch(URL,{
    method:"POST",
    body: JSON.stringify({
      nama:nama,
      jenis:"KAS_KELAS",
      jumlah:kas
    })
  }));
}

Promise.all(promises)
.then(()=>{
  document.getElementById("status").innerText = "✅ Data berhasil disimpan";

  document.getElementById("galon").value="";
  document.getElementById("kartu").value="";
  document.getElementById("kas").value="";
})
.catch(()=>{
  document.getElementById("status").innerText = "❌ Gagal simpan";
});

}

</script>

</body>
</html>
