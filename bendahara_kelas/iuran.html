<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kas Kelas</title>

<style>

*{
box-sizing:border-box;
}

body{
font-family:'Segoe UI', sans-serif;
background:#0f172a;
margin:0;
padding:20px;
color:#fff;
}

/* CONTAINER */
.container{
max-width:420px;
margin:auto;
}

/* CARD */
.card{
background:#1e293b;
padding:20px;
border-radius:16px;
box-shadow:0 8px 20px rgba(0,0,0,0.4);
}

/* TITLE */
h2{
text-align:center;
margin-bottom:20px;
}

/* FORM */
.form-group{
margin-bottom:15px;
width:100%;
}

/* LABEL */
label{
font-size:13px;
margin-bottom:6px;
display:block;
color:#cbd5e1;
}

/* INPUT FIX FULL WIDTH */
select, input{
width:100%;
padding:12px;
border-radius:10px;
border:none;
background:#334155;
color:white;
font-size:14px;
display:block;
}

/* ROW 2 KOLOM */
.row{
display:flex;
gap:12px;
}

.col{
flex:1;
}

/* BUTTON */
button{
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:#22c55e;
color:white;
font-weight:bold;
font-size:15px;
cursor:pointer;
margin-top:10px;
}

button:hover{
background:#16a34a;
}

/* STATUS */
#status{
text-align:center;
margin-top:10px;
font-size:13px;
}

/* FIX BIAR TIDAK BERANTAKAN */
select:focus, input:focus{
outline:none;
box-shadow:0 0 0 2px #22c55e;
}

</style>

</head>
<body>

<div class="container">

<div class="card">

<h2>💰 Kas Kelas</h2>

<!-- NAMA -->
<div class="form-group">
<label>Nama Siswa</label>
<select id="nama">
<option>Loading data...</option>
</select>
</div>

<!-- ROW GALON & KARTU -->
<div class="row">

<div class="col">
<label>💧 Galon</label>
<input type="number" id="galon" placeholder="Rp">
</div>

<div class="col">
<label>🎫 Kartu</label>
<input type="number" id="kartu" placeholder="Rp">
</div>

</div>

<!-- KAS -->
<div class="form-group">
<label>💰 Iuran Kas</label>
<input type="number" id="kas" placeholder="Rp">
</div>

<button onclick="kirim()">Simpan Data</button>

<div id="status"></div>

</div>

</div>

<script>

const URL = "https://script.google.com/macros/s/AKfycbwQ0v3rev6JV1ubaV6E2aGNgN7Ji4uuQxAcs4xsBSuWGKwEsPftfYhwNKf6aY9KYlRkVw/exec";

// LOAD DATA SISWA
async function loadSiswa(){
  const select = document.getElementById("nama");

  try{
    const res = await fetch(URL + "?t=" + Date.now());
    const data = await res.json();

    select.innerHTML = '<option value="">-- Pilih Siswa --</option>';

    data.forEach(nama=>{
      let opt = document.createElement("option");
      opt.value = nama;
      opt.textContent = nama;
      select.appendChild(opt);
    });

  }catch(e){
    select.innerHTML = "<option>❌ Gagal load</option>";
  }
}

// KIRIM DATA
function kirim(){

  const nama = document.getElementById("nama").value;
  const galon = document.getElementById("galon").value;
  const kartu = document.getElementById("kartu").value;
  const kas = document.getElementById("kas").value;

  if(!nama){
    alert("Pilih siswa dulu!");
    return;
  }

  let promises = [];

  if(galon){
    promises.push(fetch(URL,{
      method:"POST",
      body: JSON.stringify({nama, jenis:"GALON", jumlah:galon})
    }));
  }

  if(kartu){
    promises.push(fetch(URL,{
      method:"POST",
      body: JSON.stringify({nama, jenis:"KARTU_PELAJAR", jumlah:kartu})
    }));
  }

  if(kas){
    promises.push(fetch(URL,{
      method:"POST",
      body: JSON.stringify({nama, jenis:"KAS_KELAS", jumlah:kas})
    }));
  }

  Promise.all(promises)
  .then(()=>{
    document.getElementById("status").innerText = "✅ Data tersimpan";

    document.getElementById("galon").value="";
    document.getElementById("kartu").value="";
    document.getElementById("kas").value="";
  })
  .catch(()=>{
    document.getElementById("status").innerText = "❌ Gagal simpan";
  });

}

window.onload = loadSiswa;

</script>

</body>
</html>
