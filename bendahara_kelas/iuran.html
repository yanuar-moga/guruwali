<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Input Pembayaran</title>

<style>
body{
font-family:Segoe UI;
background:#0f172a;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.container{
background:#1e293b;
padding:25px;
border-radius:15px;
width:340px;
}

h2{
text-align:center;
margin-bottom:15px;
}

select, input, button{
width:100%;
padding:10px;
margin-top:10px;
border:none;
border-radius:8px;
}

button{
background:#22c55e;
color:white;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#16a34a;
}

#status{
margin-top:10px;
text-align:center;
}
</style>

</head>
<body>

<div class="container">
<h2>Input Pembayaran</h2>

<select id="nama">
<option>Loading data siswa...</option>
</select>

<select id="jenis">
<option value="GALON">Bayar Galon</option>
<option value="KARTU_PELAJAR">Bayar Kartu Pelajar</option>
<option value="KAS_KELAS">Kas Kelas</option>
</select>

<input type="number" id="jumlah" placeholder="Jumlah Bayar">

<button onclick="kirim()">Simpan</button>

<div id="status"></div>
</div>

<script>

const URL = "PASTE_URL_WEB_APP_KAMU";

// LOAD DATA SISWA
fetch(URL)
.then(res => res.json())
.then(data => {
  let select = document.getElementById("nama");
  select.innerHTML = "";

  data.forEach(nama => {
    let opt = document.createElement("option");
    opt.value = nama;
    opt.textContent = nama;
    select.appendChild(opt);
  });
});

// KIRIM DATA
function kirim(){

let data = {
  nama: document.getElementById("nama").value,
  jenis: document.getElementById("jenis").value,
  jumlah: document.getElementById("jumlah").value
};

fetch(URL, {
  method: "POST",
  body: JSON.stringify(data)
})
.then(res => res.json())
.then(res => {
  document.getElementById("status").innerText = "✅ Berhasil disimpan";
})
.catch(err => {
  document.getElementById("status").innerText = "❌ Gagal kirim";
});

}

</script>

</body>
</html>
