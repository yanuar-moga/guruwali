<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Input Pembayaran</title>

<style>

body{
font-family:Segoe UI;
background:#0f172a;
color:white;
margin:0;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
width:90%;
max-width:700px;
background:#1e293b;
padding:20px;
border-radius:12px;
}

h2{
text-align:center;
margin-bottom:20px;
}

/* GRID */
.form-grid{
display:grid;
grid-template-columns: repeat(6, 1fr);
gap:10px;
}

/* HEADER */
.header{
font-weight:bold;
text-align:center;
font-size:13px;
}

/* INPUT */
select, input{
width:100%;
padding:8px;
border-radius:6px;
border:none;
text-align:center;
}

/* BUTTON */
button{
margin-top:15px;
width:100%;
padding:12px;
border:none;
border-radius:8px;
background:#22c55e;
color:white;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#16a34a;
}

#status{
text-align:center;
margin-top:10px;
}

</style>

</head>
<body>

<div class="container">
<h2>Input Pembayaran</h2>

<div class="form-grid">

<div class="header">Nama Siswa</div>
<div class="header">Bayar Galon</div>
<div class="header">Input</div>
<div class="header">Bayar Kartu</div>
<div class="header">Input</div>
<div class="header">Iuran Kas</div>

<select id="nama"></select>

<div>✔</div>
<input type="number" id="galon" placeholder="Rp">

<div>✔</div>
<input type="number" id="kartu" placeholder="Rp">

<input type="number" id="kas" placeholder="Rp">

</div>

<button onclick="kirim()">Simpan Data</button>

<div id="status"></div>

</div>

<script>

const URL = "PASTE_URL_WEB_APP_KAMU";

// LOAD DATA SISWA
window.onload = function(){

fetch(URL)
.then(res => res.json())
.then(data => {

  const select = document.getElementById("nama");
  select.innerHTML = '<option value="">Pilih Siswa</option>';

  data.forEach(nama => {
    let opt = document.createElement("option");
    opt.value = nama;
    opt.textContent = nama;
    select.appendChild(opt);
  });

});

}


// KIRIM DATA
function kirim(){

const nama = document.getElementById("nama").value;
const galon = document.getElementById("galon").value;
const kartu = document.getElementById("kartu").value;
const kas = document.getElementById("kas").value;

if(!nama){
  alert("Pilih siswa dulu!");
  return;
}

let promises = [];

// GALON
if(galon){
  promises.push(fetch(URL,{
    method:"POST",
    body: JSON.stringify({
      nama:nama,
      jenis:"GALON",
      jumlah:galon
    })
  }));
}

// KARTU
if(kartu){
  promises.push(fetch(URL,{
    method:"POST",
    body: JSON.stringify({
      nama:nama,
      jenis:"KARTU_PELAJAR",
      jumlah:kartu
    })
  }));
}

// KAS
if(kas){
  promises.push(fetch(URL,{
    method:"POST",
    body: JSON.stringify({
      nama:nama,
      jenis:"KAS_KELAS",
      jumlah:kas
    })
  }));
}

Promise.all(promises)
.then(()=>{
  document.getElementById("status").innerText = "✅ Data berhasil disimpan";

  // reset
  document.getElementById("galon").value="";
  document.getElementById("kartu").value="";
  document.getElementById("kas").value="";
})
.catch(()=>{
  document.getElementById("status").innerText = "❌ Gagal simpan";
});

}

</script>

</body>
</html>
