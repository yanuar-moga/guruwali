<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cek Tagihan</title>

<style>
body{
font-family:Segoe UI;
background:#0f172a;
color:white;
margin:0;
padding:15px;
}
.container{max-width:420px;margin:auto;}
.card{
background:#1e293b;
padding:15px;
border-radius:15px;
margin-bottom:15px;
}
h2{text-align:center;margin-bottom:10px;}

select{
width:100%;
padding:12px;
border-radius:10px;
border:none;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-top:10px;
}

.stat{
background:#334155;
padding:10px;
border-radius:10px;
text-align:center;
font-size:13px;
}

.value{
font-size:16px;
font-weight:bold;
}

table{
width:100%;
border-collapse:collapse;
font-size:13px;
}

th,td{
padding:10px;
vertical-align:top;
}

th{background:#334155;}
td{
background:#1e293b;
border-bottom:1px solid #334155;
}

.nama{font-weight:bold;}
.kurang-besar{color:#ef4444;font-weight:bold;}
.kurang-kecil{color:#facc15;}

small{
color:#94a3b8;
font-size:11px;
}

.loading{text-align:center;color:#94a3b8;}
</style>
</head>

<body>

<div class="container">

<div class="card">
<h2>📊 Statistik Kelas (Belum Bayar)</h2>
<div class="grid" id="dashboard"><div class="loading">Loading...</div></div>
</div>

<div class="card">
<h2>👤 Cek Tagihan</h2>
<select id="nama">
<option>Loading...</option>
</select>
</div>

<div id="hasil"></div>

<div class="card">
<h2>⚠️ Daftar Tunggakan</h2>
<table>
<thead id="thead"></thead>
<tbody id="belumTable"></tbody>
</table>
</div>

</div>

<script>

const URL = "https://script.google.com/macros/s/AKfycbwQ0v3rev6JV1ubaV6E2aGNgN7Ji4uuQxAcs4xsBSuWGKwEsPftfYhwNKf6aY9KYlRkVw/exec";

let dataRekap = [];
let headers = [];
let idxNama = 0;

// ================= LOGIN =================
function cekLogin(){
const pin = localStorage.getItem("pin");

if(!pin){
alert("Silakan login dulu!");
window.location.href = "input_iuran";
return;
}

load();
}

// ================= FORMAT =================
function rupiah(angka){
return "Rp " + Number(angka || 0).toLocaleString("id-ID");
}

// ================= LOAD =================
async function load(){
try{

// ===== SISWA =====
let res1 = await fetch(URL);
let namaList = await res1.json();

let select = document.getElementById("nama");
select.innerHTML = '<option value="">-- Pilih Nama --</option>';

namaList.forEach(n=>{
let opt = document.createElement("option");
opt.value = n;
opt.textContent = n;
select.appendChild(opt);
});

// ===== REKAP =====
let res2 = await fetch(URL + "?mode=rekap");
let raw = await res2.json();

if(!Array.isArray(raw) || raw.length === 0){
throw "Data rekap kosong";
}

headers = raw[0];
dataRekap = raw.slice(1);

// 🔥 cari index nama (lebih fleksibel)
idxNama = headers.findIndex(h => 
h.toString().toUpperCase().includes("NAMA")
);

if(idxNama === -1) idxNama = 0;

// ===== HEADER TABEL =====
let thHTML = "<tr><th>Nama</th>";

for(let i=1;i<headers.length;i+=3){
let jenis = headers[i].replace(" BAYAR","");
thHTML += `<th>${jenis}</th>`;
}

thHTML += "</tr>";
document.getElementById("thead").innerHTML = thHTML;

// ===== DASHBOARD =====
let res3 = await fetch(URL + "?mode=dashboard");
let dash = await res3.json();

let dashHTML = "";

Object.keys(dash).forEach(k=>{

if(k.toUpperCase().includes("BELUM")){
dashHTML += `
<div class="stat">
${k.replace("JUMLAH SISWA ","")}
<div class="value">${dash[k]}</div>
</div>`;
}

});

if(!dashHTML) dashHTML = "<div class='loading'>Tidak ada data</div>";

document.getElementById("dashboard").innerHTML = dashHTML;

// ===== TABEL =====
tampilkanBelum();

}catch(e){
console.error(e);
document.getElementById("dashboard").innerHTML = "❌ Error";
document.getElementById("belumTable").innerHTML =
"<tr><td colspan='10'>❌ Gagal load</td></tr>";
}
}

// ================= DETAIL =================
document.getElementById("nama").onchange = function(){

let siswa = dataRekap.find(r => r[idxNama] === this.value);

if(!siswa){
document.getElementById("hasil").innerHTML = "";
return;
}

let html = `<div class="card">`;

for(let i=1;i<headers.length;i+=3){
let jenis = headers[i].replace(" BAYAR","");
let bayar = Number(siswa[i] || 0);
let sisa = Number(siswa[i+1] || 0);

html += `
<div>
<b>${jenis}</b><br>
Bayar: ${rupiah(bayar)}<br>
Sisa: ${rupiah(sisa)}
</div><br>`;
}

html += `</div>`;

document.getElementById("hasil").innerHTML = html;
};

// ================= TUNGGAKAN =================
function tampilkanBelum(){

let sorted = dataRekap.map(r=>{

let total = 0;

for(let i=2;i<headers.length;i+=3){
total += Number(r[i] || 0);
}

return {nama:r[idxNama], row:r, total};

}).sort((a,b)=> b.total - a.total);

let html = "";

sorted.forEach(s=>{

let warna = s.total > 50000 ? "kurang-besar" : "kurang-kecil";

let rowHTML = `
<tr>
<td class="nama">
${s.nama}<br>
<small>Total: <span class="${warna}">${rupiah(s.total)}</span></small>
</td>`;

for(let i=1;i<headers.length;i+=3){
let sisa = Number(s.row[i+1] || 0);
rowHTML += `<td>${rupiah(sisa)}</td>`;
}

rowHTML += "</tr>";

html += rowHTML;

});

document.getElementById("belumTable").innerHTML = html || 
"<tr><td colspan='10'>Tidak ada data</td></tr>";
}

// ================= INIT =================
window.onload = cekLogin;

</script>

</body>
</html>
