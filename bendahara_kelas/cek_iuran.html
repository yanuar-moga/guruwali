<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cek Tagihan</title>

<style>
body{
font-family:Segoe UI;
background:#0f172a;
color:white;
margin:0;
padding:15px;
}

.container{max-width:420px;margin:auto;}

.card{
background:#1e293b;
padding:15px;
border-radius:15px;
margin-bottom:15px;
}

h2{text-align:center;margin-bottom:10px;}

select{
width:100%;
padding:12px;
border-radius:10px;
border:none;
}

.box{
padding:12px;
border-radius:10px;
margin-top:10px;
}

.lunas{ background:#14532d; }
.belum{ background:#7f1d1d; }

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-top:10px;
}

.stat{
background:#334155;
padding:10px;
border-radius:10px;
text-align:center;
font-size:13px;
}

.value{
font-size:16px;
font-weight:bold;
}

/* tabel belum */
table{
width:100%;
border-collapse:collapse;
font-size:13px;
}

td,th{
padding:8px;
background:#1e293b;
vertical-align:top;
}

th{
background:#334155;
}

td{
border-bottom:1px solid #334155;
}

small{
color:#94a3b8;
font-size:11px;
}
</style>
</head>

<body>

<div class="container">

<div class="card">
<h2>📊 Statistik Kelas</h2>
<div class="grid" id="dashboard">Loading...</div>
</div>

<div class="card">
<h2>👤 Cek Tagihan</h2>
<select id="nama">
<option>Loading...</option>
</select>
</div>

<div id="hasil"></div>

<div class="card">
<h2>⚠️ Daftar Belum Lunas</h2>

<table>
<thead>
<tr>
<th>💧 Galon</th>
<th>🎫 Kartu</th>
<th>🎁 Tali Asih</th>
</tr>
</thead>
<tbody id="belumTable"></tbody>
</table>

</div>

</div>

<script>

const URL = "https://script.google.com/macros/s/AKfycbwQ0v3rev6JV1ubaV6E2aGNgN7Ji4uuQxAcs4xsBSuWGKwEsPftfYhwNKf6aY9KYlRkVw/exec";

let dataRekap = [];

function rupiah(angka){
  return "Rp " + Number(angka || 0).toLocaleString("id-ID");
}

// ================= LOAD =================
async function load(){
  try{

    const res1 = await fetch(URL);
    const namaList = await res1.json();

    const select = document.getElementById("nama");
    select.innerHTML = '<option value="">-- Pilih Nama --</option>';

    namaList.forEach(n=>{
      let opt = document.createElement("option");
      opt.value = n;
      opt.textContent = n;
      select.appendChild(opt);
    });

    const res2 = await fetch(URL + "?mode=rekap");
    dataRekap = await res2.json();

    const res3 = await fetch(URL + "?mode=dashboard");
    const dash = await res3.json();

    document.getElementById("dashboard").innerHTML = `
      <div class="stat">💧 Lunas<br><div class="value">${dash.sudahGalon}</div></div>
      <div class="stat">💧 Belum<br><div class="value">${dash.belumGalon}</div></div>
      <div class="stat">🎫 Lunas<br><div class="value">${dash.sudahKartu}</div></div>
      <div class="stat">🎫 Belum<br><div class="value">${dash.belumKartu}</div></div>
      <div class="stat">💰 Galon<br><div class="value">${rupiah(dash.totalGalon)}</div></div>
      <div class="stat">🎫 Kartu<br><div class="value">${rupiah(dash.totalKartu)}</div></div>
      <div class="stat">💰 Kas<br><div class="value">${rupiah(dash.totalKas)}</div></div>
      <div class="stat">🎁 Tali<br><div class="value">${rupiah(dash.totalTali)}</div></div>
    `;

    tampilkanBelum();

  }catch(e){
    console.error(e);
    document.getElementById("dashboard").innerHTML = "❌ Gagal load data";
    document.getElementById("belumTable").innerHTML = "❌ Gagal load data";
  }
}

// ================= PILIH SISWA =================
document.getElementById("nama").onchange = function(){

  let siswa = dataRekap.find(d => d.nama === this.value);
  if(!siswa) return;

  document.getElementById("hasil").innerHTML = `
  <div class="card">

    <div class="box ${siswa.statusGalon=="LUNAS"?"lunas":"belum"}">
      💧 Galon<br>
      Sisa: ${rupiah(siswa.galonSisa)}<br>
      <b>${siswa.statusGalon}</b>
    </div>

    <div class="box ${siswa.statusKartu=="LUNAS"?"lunas":"belum"}">
      🎫 Kartu<br>
      Sisa: ${rupiah(siswa.kartuSisa)}<br>
      <b>${siswa.statusKartu}</b>
    </div>

    <div class="box">
      💰 Total Kas<br>
      <b>${rupiah(siswa.kas)}</b>
    </div>

    <div class="box">
      🎁 Tali Asih<br>
      <b>${rupiah(siswa.taliAsih)}</b>
    </div>

  </div>
  `;
};

// ================= BELUM LUNAS PRO =================
function tampilkanBelum(){

  let galon = [];
  let kartu = [];
  let tali = [];

  let sorted = dataRekap.map(s => {

    let kurangGalon = Number(s.galonSisa || 0);
    let kurangKartu = Number(s.kartuSisa || 0);

    return {
      ...s,
      totalKurang: kurangGalon + kurangKartu
    };

  }).sort((a,b)=> b.totalKurang - a.totalKurang);

  sorted.forEach(s=>{

    let kurangGalon = Number(s.galonSisa || 0);
    let kurangKartu = Number(s.kartuSisa || 0);
    let total = kurangGalon + kurangKartu;

    let warna = total > 50000 ? "#ef4444" : "#facc15";

    if(s.statusGalon !== "LUNAS"){
      galon.push(`
        <b>${s.nama}</b><br>
        <small>Bayar: ${rupiah(s.galonBayar)}<br>
        Kurang: ${rupiah(kurangGalon)}</small><br>
        <span style="color:${warna}">Total: ${rupiah(total)}</span>
      `);
    }

    if(s.statusKartu !== "LUNAS"){
      kartu.push(`
        <b>${s.nama}</b><br>
        <small>Bayar: ${rupiah(s.kartuBayar)}<br>
        Kurang: ${rupiah(kurangKartu)}</small><br>
        <span style="color:${warna}">Total: ${rupiah(total)}</span>
      `);
    }

    if(!s.taliAsih || s.taliAsih == 0){
      tali.push(`
        <b>${s.nama}</b><br>
        <small>Bayar: ${rupiah(s.taliAsih)}</small>
      `);
    }

  });

  let max = Math.max(galon.length, kartu.length, tali.length);
  let html = "";

  for(let i=0;i<max;i++){
    html += `
    <tr>
      <td>${galon[i] || "-"}</td>
      <td>${kartu[i] || "-"}</td>
      <td>${tali[i] || "-"}</td>
    </tr>
    `;
  }

  if(max === 0){
    html = `<tr><td colspan="3" style="text-align:center;">Semua lunas 🎉</td></tr>`;
  }

  document.getElementById("belumTable").innerHTML = html;
}

window.onload = load;

</script>

</body>
</html>
