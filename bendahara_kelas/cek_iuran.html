<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cek Tagihan</title>

<style>

body{
font-family:Segoe UI;
background:#0f172a;
color:white;
margin:0;
padding:15px;
}

.container{
max-width:420px;
margin:auto;
}

.card{
background:#1e293b;
padding:15px;
border-radius:15px;
margin-bottom:15px;
}

h2{
text-align:center;
margin-bottom:10px;
}

select{
width:100%;
padding:12px;
border-radius:10px;
border:none;
}

/* BOX */
.box{
padding:12px;
border-radius:10px;
margin-top:10px;
}

.lunas{ background:#14532d; }
.belum{ background:#7f1d1d; }

/* DASHBOARD */
.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-top:10px;
}

.stat{
background:#334155;
padding:10px;
border-radius:10px;
text-align:center;
font-size:13px;
}

.value{
font-size:16px;
font-weight:bold;
}

/* LIST BELUM */
.list-item{
background:#334155;
padding:10px;
border-radius:10px;
margin-top:8px;
font-size:13px;
}

</style>

</head>
<body>

<div class="container">

<!-- DASHBOARD -->
<div class="card">
<h2>📊 Statistik Kelas</h2>
<div class="grid" id="dashboard">Loading...</div>
</div>

<!-- PILIH NAMA -->
<div class="card">
<h2>👤 Cek Tagihan</h2>
<select id="nama">
<option>Loading...</option>
</select>
</div>

<!-- HASIL -->
<div id="hasil"></div>

<!-- BELUM LUNAS -->
<div class="card">
<h2>⚠️ Belum Lunas</h2>
<div id="belumList">Loading...</div>
</div>

</div>

<script>

const URL = "https://script.google.com/macros/s/AKfycbwQ0v3rev6JV1ubaV6E2aGNgN7Ji4uuQxAcs4xsBSuWGKwEsPftfYhwNKf6aY9KYlRkVw/exec";

let dataRekap = [];

// FORMAT RUPIAH
function rupiah(angka){
  return "Rp " + Number(angka).toLocaleString("id-ID");
}

// LOAD DATA
async function load(){

  // nama siswa
  let res1 = await fetch(URL);
  let namaList = await res1.json();

  let select = document.getElementById("nama");
  select.innerHTML = '<option value="">-- Pilih Nama --</option>';

  namaList.forEach(n=>{
    let opt = document.createElement("option");
    opt.value = n;
    opt.textContent = n;
    select.appendChild(opt);
  });

  // rekap siswa
  let res2 = await fetch(URL + "?mode=rekap");
  dataRekap = await res2.json();

  // dashboard
  let res3 = await fetch(URL + "?mode=dashboard");
  let dash = await res3.json();

  document.getElementById("dashboard").innerHTML = `
    <div class="stat">💧 Lunas<br><div class="value">${dash.sudahGalon}</div></div>
    <div class="stat">💧 Belum<br><div class="value">${dash.belumGalon}</div></div>
    <div class="stat">🎫 Lunas<br><div class="value">${dash.sudahKartu}</div></div>
    <div class="stat">🎫 Belum<br><div class="value">${dash.belumKartu}</div></div>
    <div class="stat">💰 Galon<br><div class="value">${rupiah(dash.totalGalon)}</div></div>
    <div class="stat">🎫 Kartu<br><div class="value">${rupiah(dash.totalKartu)}</div></div>
    <div class="stat" style="grid-column:1/3">💰 Total Kas<br><div class="value">${rupiah(dash.totalKas)}</div></div>
  `;

  tampilkanBelum();
}

// TAMPILKAN DATA SISWA
document.getElementById("nama").onchange = function(){

  let siswa = dataRekap.find(d => d.nama === this.value);
  if(!siswa) return;

  document.getElementById("hasil").innerHTML = `
  <div class="card">

    <div class="box ${siswa.statusGalon=="LUNAS"?"lunas":"belum"}">
      💧 Galon<br>
      Sisa: ${rupiah(siswa.galonSisa)}<br>
      <b>${siswa.statusGalon}</b>
    </div>

    <div class="box ${siswa.statusKartu=="LUNAS"?"lunas":"belum"}">
      🎫 Kartu<br>
      Sisa: ${rupiah(siswa.kartuSisa)}<br>
      <b>${siswa.statusKartu}</b>
    </div>

    <div class="box">
      💰 Total Kas<br>
      <b>${rupiah(siswa.kas)}</b>
    </div>

  </div>
  `;
};

// LIST BELUM LUNAS
function tampilkanBelum(){

  let belum = dataRekap.filter(s => 
    s.statusGalon !== "LUNAS" || s.statusKartu !== "LUNAS"
  );

  if(belum.length === 0){
    document.getElementById("belumList").innerHTML = "Semua sudah lunas 🎉";
    return;
  }

  let html = "";

  belum.forEach(s=>{
    html += `
    <div class="list-item">
      <b>${s.nama}</b><br>
      ${s.statusGalon !== "LUNAS" ? "💧 Galon: BELUM<br>" : ""}
      ${s.statusKartu !== "LUNAS" ? "🎫 Kartu: BELUM" : ""}
    </div>
    `;
  });

  document.getElementById("belumList").innerHTML = html;
}

window.onload = load;

</script>

</body>
</html>
