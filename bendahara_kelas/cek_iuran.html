<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cek Tagihan</title>

<style>
body{
font-family:Segoe UI;
background:#0f172a;
color:white;
margin:0;
padding:15px;
}

.container{max-width:420px;margin:auto;}

.card{
background:#1e293b;
padding:15px;
border-radius:15px;
margin-bottom:15px;
}

h2{text-align:center;margin-bottom:10px;}

select{
width:100%;
padding:12px;
border-radius:10px;
border:none;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-top:10px;
}

.stat{
background:#334155;
padding:10px;
border-radius:10px;
text-align:center;
font-size:13px;
}

.value{
font-size:16px;
font-weight:bold;
}

table{
width:100%;
border-collapse:collapse;
font-size:13px;
}

th,td{
padding:10px;
vertical-align:top;
}

th{background:#334155;}

td{
background:#1e293b;
border-bottom:1px solid #334155;
}

.nama{font-weight:bold;}
.kurang-besar{color:#ef4444;font-weight:bold;}
.kurang-kecil{color:#22c55e;font-weight:bold;}

small{
color:#94a3b8;
font-size:11px;
}
</style>
</head>

<body>

<div class="container">

<div class="card">
<h2>📊 Statistik Kelas</h2>
<div class="grid" id="dashboard">Loading...</div>
</div>

<div class="card">
<h2>👤 Cek Tagihan</h2>
<select id="nama">
<option>Loading...</option>
</select>
</div>

<div id="hasil"></div>

<div class="card">
<h2>⚠️ Daftar Tunggakan</h2>

<table>
<thead>
<tr id="headerTable">
<th>Nama</th>
</tr>
</thead>
<tbody id="belumTable"></tbody>
</table>

</div>

</div>

<script>

const URL = "https://script.google.com/macros/s/AKfycbwQ0v3rev6JV1ubaV6E2aGNgN7Ji4uuQxAcs4xsBSuWGKwEsPftfYhwNKf6aY9KYlRkVw/exec";

let dataRekap = [];
let currentPIN = "";
let jenisList = [];

// ================= LOGIN =================
function cekLogin(){

  const pin = localStorage.getItem("pin");

  if(!pin){
    alert("Silakan login dulu di halaman input!");
    window.location.href = "input_iuran";
    return;
  }

  currentPIN = pin;
  load();
}

// ================= FORMAT =================
function rupiah(angka){
  return "Rp " + Number(angka || 0).toLocaleString("id-ID");
}

// ================= LOAD =================
async function load(){
  try{

    // ===== ambil nama =====
    let res1 = await fetch(URL);
    let namaList = await res1.json();

    let select = document.getElementById("nama");
    select.innerHTML = '<option value="">-- Pilih Nama --</option>';

    namaList.forEach(n=>{
      let opt = document.createElement("option");
      opt.value = n;
      opt.textContent = n;
      select.appendChild(opt);
    });

    // ===== ambil rekap =====
    let res2 = await fetch(URL + "?mode=rekap");
    dataRekap = await res2.json();

    if(dataRekap.length){
      jenisList = Object.keys(dataRekap[0].dynamic || {}).sort();
      buatHeader();
    }

    // ===== dashboard =====
    let res3 = await fetch(URL + "?mode=dashboard");
    let dash = await res3.json();

    document.getElementById("dashboard").innerHTML = `
      <div class="stat">💧 Lunas<br><div class="value">${dash.sudahGalon}</div></div>
      <div class="stat">💧 Belum<br><div class="value">${dash.belumGalon}</div></div>
      <div class="stat">🎫 Lunas<br><div class="value">${dash.sudahKartu}</div></div>
      <div class="stat">🎫 Belum<br><div class="value">${dash.belumKartu}</div></div>
      <div class="stat">💰 Galon<br><div class="value">${rupiah(dash.totalGalon)}</div></div>
      <div class="stat">🎫 Kartu<br><div class="value">${rupiah(dash.totalKartu)}</div></div>
      <div class="stat">💰 Kas<br><div class="value">${rupiah(dash.totalKas)}</div></div>
      <div class="stat">🎁 Tali<br><div class="value">${rupiah(dash.totalTali)}</div></div>
    `;

    tampilkanBelum();

  }catch(e){
    console.error(e);
    document.getElementById("belumTable").innerHTML = "<tr><td colspan='10'>❌ Gagal load</td></tr>";
  }
}

// ================= HEADER =================
function buatHeader(){
  let h = "<th>Nama</th>";

  jenisList.forEach(j=>{
    h += `<th>${j}</th>`;
  });

  document.getElementById("headerTable").innerHTML = h;
}

// ================= DETAIL =================
document.getElementById("nama").onchange = function(){

  let s = dataRekap.find(d => d.nama === this.value);
  if(!s) return;

  let html = "";

  jenisList.forEach(j=>{
    let d = s.dynamic[j] || {bayar:0, target:0};
    let kurang = Math.max(0, d.target - d.bayar);

    html += `${j}: ${rupiah(d.bayar)} | Sisa: ${rupiah(kurang)}<br>`;
  });

  document.getElementById("hasil").innerHTML = `
  <div class="card">${html}</div>`;
};

// ================= TUNGGAKAN =================
function tampilkanBelum(){

  let sorted = dataRekap.map(s=>{

    let total = 0;
    let detail = {};

    jenisList.forEach(j=>{
      let d = s.dynamic[j] || {bayar:0, target:0};
      let kurang = Math.max(0, d.target - d.bayar);

      detail[j] = kurang;
      total += kurang;
    });

    return {...s, detail, total};

  }).sort((a,b)=> b.total - a.total);

  let html = "";

  sorted.forEach(s=>{

    let warna = s.total > 0 ? "kurang-besar" : "kurang-kecil";

    let cols = "";

    jenisList.forEach(j=>{
      let bayar = s.dynamic[j]?.bayar || 0;
      let kurang = s.detail[j] || 0;

      cols += `<td>Bayar: ${rupiah(bayar)}<br>Kurang: ${rupiah(kurang)}</td>`;
    });

    html += `
    <tr>
      <td class="nama">${s.nama}<br>
      <small>Total: <span class="${warna}">${rupiah(s.total)}</span></small>
      </td>
      ${cols}
    </tr>`;
  });

  document.getElementById("belumTable").innerHTML = html;
}

// ================= INIT =================
window.onload = cekLogin;

</script>

</body>
</html>
