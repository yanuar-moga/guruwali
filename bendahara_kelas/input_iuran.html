<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kas Kelas</title>

<style>

*{
box-sizing:border-box;
}

body{
font-family:'Segoe UI', sans-serif;
background:#0f172a;
margin:0;
padding:20px;
color:#fff;
}

/* CONTAINER */
.container{
max-width:420px;
margin:auto;
}

/* CARD */
.card{
background:#1e293b;
padding:20px;
border-radius:16px;
box-shadow:0 8px 20px rgba(0,0,0,0.4);
}

/* TITLE */
h2{
text-align:center;
margin-bottom:20px;
}

/* FORM */
.form-group{
margin-bottom:15px;
width:100%;
}

/* LABEL */
label{
font-size:13px;
margin-bottom:6px;
display:block;
color:#cbd5e1;
}

/* INPUT */
select, input{
width:100%;
padding:12px;
border-radius:10px;
border:none;
background:#334155;
color:white;
font-size:14px;
}

/* ROW */
.row{
display:flex;
gap:12px;
}

.col{
flex:1;
}

/* BUTTON */
button{
width:100%;
padding:14px;
border:none;
border-radius:12px;
color:white;
font-weight:bold;
font-size:15px;
cursor:pointer;
margin-top:10px;
display:flex;
align-items:center;
justify-content:center;
gap:8px;
}

/* BUTTON WARNA */
.btn-simpan{
background:#22c55e;
}
.btn-simpan:hover{
background:#16a34a;
}

.btn-rekap{
background:#3b82f6;
}
.btn-rekap:hover{
background:#2563eb;
}

/* LOADING SPINNER */
.spinner{
width:18px;
height:18px;
border:3px solid #fff;
border-top:3px solid transparent;
border-radius:50%;
animation:spin 0.8s linear infinite;
display:none;
}

@keyframes spin{
to{ transform:rotate(360deg); }
}

/* TOAST */
.toast{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%) translateY(100px);
background:#1e293b;
padding:14px 20px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,0.4);
opacity:0;
transition:all 0.4s;
font-size:14px;
z-index:999;
}

.toast.show{
opacity:1;
transform:translateX(-50%) translateY(0);
}

.toast.success{
border-left:5px solid #22c55e;
}

.toast.error{
border-left:5px solid #ef4444;
}

/* FOCUS */
select:focus, input:focus{
outline:none;
box-shadow:0 0 0 2px #22c55e;
}

</style>

</head>
<body>

<div class="container">

<div class="card">

<h2>💰 Kas Kelas</h2>

<!-- NAMA -->
<div class="form-group">
<label>Nama Siswa</label>
<select id="nama">
<option>Loading data...</option>
</select>
</div>

<!-- GALON & KARTU -->
<div class="row">

<div class="col">
<label>💧 Galon</label>
<input type="number" id="galon" placeholder="Rp">
</div>

<div class="col">
<label>🎫 Kartu</label>
<input type="number" id="kartu" placeholder="Rp">
</div>

</div>

<!-- KAS -->
<div class="form-group">
<label>💰 Iuran Kas</label>
<input type="number" id="kas" placeholder="Rp">
</div>

<!-- BUTTON -->
<button class="btn-simpan" id="btnSimpan" onclick="kirim()">
<span id="btnText">Simpan Data</span>
<div class="spinner" id="spinner"></div>
</button>

<button class="btn-rekap" onclick="lihatRekap()">📊 Lihat Rekap Data</button>

</div>

</div>

<!-- TOAST -->
<div id="toast" class="toast"></div>

<script>

const URL = "https://script.google.com/macros/s/AKfycbwQ0v3rev6JV1ubaV6E2aGNgN7Ji4uuQxAcs4xsBSuWGKwEsPftfYhwNKf6aY9KYlRkVw/exec";

// LOAD SISWA
async function loadSiswa(){
  const select = document.getElementById("nama");

  try{
    const res = await fetch(URL + "?t=" + Date.now());
    const data = await res.json();

    select.innerHTML = '<option value="">-- Pilih Siswa --</option>';

    data.forEach(nama=>{
      let opt = document.createElement("option");
      opt.value = nama;
      opt.textContent = nama;
      select.appendChild(opt);
    });

  }catch(e){
    select.innerHTML = "<option>❌ Gagal load</option>";
  }
}

// TOAST FUNCTION
function showToast(message, type="success"){
  const toast = document.getElementById("toast");
  toast.innerText = message;
  toast.className = "toast show " + type;

  setTimeout(()=>{
    toast.className = "toast";
  }, 2500);
}

// KIRIM DATA
function kirim(){

  const nama = document.getElementById("nama").value;
  const galon = document.getElementById("galon").value;
  const kartu = document.getElementById("kartu").value;
  const kas = document.getElementById("kas").value;

  if(!nama){
    showToast("⚠️ Pilih siswa dulu!", "error");
    return;
  }

  let promises = [];

  if(galon){
    promises.push(fetch(URL,{
      method:"POST",
      body: JSON.stringify({nama, jenis:"GALON", jumlah:galon})
    }));
  }

  if(kartu){
    promises.push(fetch(URL,{
      method:"POST",
      body: JSON.stringify({nama, jenis:"KARTU_PELAJAR", jumlah:kartu})
    }));
  }

  if(kas){
    promises.push(fetch(URL,{
      method:"POST",
      body: JSON.stringify({nama, jenis:"KAS_KELAS", jumlah:kas})
    }));
  }

  // LOADING ON
  document.getElementById("spinner").style.display = "inline-block";
  document.getElementById("btnText").innerText = "Menyimpan...";
  document.getElementById("btnSimpan").disabled = true;

  Promise.all(promises)
  .then(()=>{
    showToast("✅ Data berhasil disimpan", "success");

    document.getElementById("galon").value="";
    document.getElementById("kartu").value="";
    document.getElementById("kas").value="";
  })
  .catch(()=>{
    showToast("❌ Gagal menyimpan data", "error");
  })
  .finally(()=>{
    // LOADING OFF
    document.getElementById("spinner").style.display = "none";
    document.getElementById("btnText").innerText = "Simpan Data";
    document.getElementById("btnSimpan").disabled = false;
  });

}

// BUTTON REKAP
function lihatRekap(){
  window.open("https://yanuar-moga.github.io/guruwali/bendahara_kelas/cek_iuran","_blank");
}

window.onload = loadSiswa;

</script>

</body>
</html>
