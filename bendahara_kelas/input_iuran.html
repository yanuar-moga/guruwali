<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kas Kelas</title>

<style>
*{box-sizing:border-box;}

body{
font-family:'Segoe UI', sans-serif;
background:#0f172a;
margin:0;
padding:20px;
color:#fff;
}

/* CONTAINER */
.container{max-width:420px;margin:auto;}

/* CARD */
.card{
background:#1e293b;
padding:20px;
border-radius:16px;
box-shadow:0 8px 20px rgba(0,0,0,0.4);
margin-bottom:15px;
}

/* TITLE */
h2{text-align:center;margin-bottom:20px;}

/* FORM */
.form-group{margin-bottom:15px;width:100%;}

/* LABEL */
label{
font-size:13px;
margin-bottom:6px;
display:block;
color:#cbd5e1;
}

/* INPUT */
select, input{
width:100%;
padding:12px;
border-radius:10px;
border:none;
background:#334155;
color:white;
font-size:14px;
}

/* ROW */
.row{display:flex;gap:12px;}
.col{flex:1;}

/* BUTTON */
button{
width:100%;
padding:14px;
border:none;
border-radius:12px;
color:white;
font-weight:bold;
font-size:15px;
cursor:pointer;
margin-top:10px;
}

/* BUTTON WARNA */
.btn-login{background:#f59e0b;}
.btn-simpan{background:#22c55e;}
.btn-rekap{background:#3b82f6;}

/* DISABLED */
button:disabled{
opacity:0.5;
cursor:not-allowed;
}

/* TOAST */
.toast{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%) translateY(100px);
background:#1e293b;
padding:14px 20px;
border-radius:12px;
opacity:0;
transition:all 0.4s;
}

.toast.show{
opacity:1;
transform:translateX(-50%) translateY(0);
}

.toast.success{border-left:5px solid #22c55e;}
.toast.error{border-left:5px solid #ef4444;}

</style>
</head>

<body>

<div class="container">

<!-- LOGIN -->
<div class="card" id="loginCard">
<h2>🔐 Login Bendahara</h2>

<div class="form-group">
<label>Nama</label>
<select id="loginNama"></select>
</div>

<div class="form-group">
<label>PIN</label>
<input type="password" id="pin" placeholder="Masukkan PIN">
</div>

<button class="btn-login" onclick="login()">Login</button>
</div>

<!-- FORM -->
<div class="card" id="formCard" style="display:none;">
<h2>💰 Kas Kelas</h2>

<div class="form-group">
<label>Nama Siswa</label>
<select id="nama"></select>
</div>

<div class="row">
<div class="col">
<label>💧 Galon</label>
<input type="number" id="galon">
</div>

<div class="col">
<label>🎫 Kartu</label>
<input type="number" id="kartu">
</div>
</div>

<div class="form-group">
<label>💰 Kas</label>
<input type="number" id="kas">
</div>

<button class="btn-simpan" id="btnSimpan" onclick="kirim()">Simpan</button>
<button class="btn-rekap" onclick="lihatRekap()">📊 Rekap</button>

</div>

</div>

<div id="toast" class="toast"></div>

<script>

const URL = "https://script.google.com/macros/s/AKfycbwQ0v3rev6JV1ubaV6E2aGNgN7Ji4uuQxAcs4xsBSuWGKwEsPftfYhwNKf6aY9KYlRkVw/exec";

let currentUser = "";
let currentPIN = "";

// ================= LOAD SISWA =================
async function loadSiswa(){
  const res = await fetch(URL + "?t=" + Date.now());
  const data = await res.json();

  const nama = document.getElementById("nama");
  const loginNama = document.getElementById("loginNama");

  nama.innerHTML = '<option value="">-- Pilih Siswa --</option>';
  loginNama.innerHTML = '<option value="">-- Pilih Nama --</option>';

  data.forEach(n=>{
    nama.innerHTML += `<option>${n}</option>`;
    loginNama.innerHTML += `<option>${n}</option>`;
  });
}

// ================= LOGIN =================
function login(){

  const nama = document.getElementById("loginNama").value;
  const pin = document.getElementById("pin").value;

  if(!nama || !pin){
    showToast("Isi nama & PIN!", "error");
    return;
  }

  // SIMPAN SESSION
  localStorage.setItem("user", nama);
  localStorage.setItem("pin", pin);

  currentUser = nama;
  currentPIN = pin;

  document.getElementById("loginCard").style.display = "none";
  document.getElementById("formCard").style.display = "block";

  showToast("Login berhasil", "success");
}

// ================= AUTO LOGIN =================
function cekLogin(){
  const user = localStorage.getItem("user");
  const pin = localStorage.getItem("pin");

  if(user && pin){
    currentUser = user;
    currentPIN = pin;

    document.getElementById("loginCard").style.display = "none";
    document.getElementById("formCard").style.display = "block";
  }
}

// ================= KIRIM =================
function kirim(){

  const nama = document.getElementById("nama").value;
  const galon = document.getElementById("galon").value;
  const kartu = document.getElementById("kartu").value;
  const kas = document.getElementById("kas").value;

  if(!nama){
    showToast("Pilih siswa!", "error");
    return;
  }

  let req = [];

  if(galon){
    req.push(fetch(URL,{
      method:"POST",
      body: JSON.stringify({
        nama,
        jenis:"GALON",
        jumlah:galon,
        pin: currentPIN
      })
    }));
  }

  if(kartu){
    req.push(fetch(URL,{
      method:"POST",
      body: JSON.stringify({
        nama,
        jenis:"KARTU_PELAJAR",
        jumlah:kartu,
        pin: currentPIN
      })
    }));
  }

  if(kas){
    req.push(fetch(URL,{
      method:"POST",
      body: JSON.stringify({
        nama,
        jenis:"KAS_KELAS",
        jumlah:kas,
        pin: currentPIN
      })
    }));
  }

  Promise.all(req)
  .then(()=> showToast("Berhasil disimpan", "success"))
  .catch(()=> showToast("Gagal", "error"));
}

// ================= TOAST =================
function showToast(msg,type){
  const t = document.getElementById("toast");
  t.innerText = msg;
  t.className = "toast show " + type;

  setTimeout(()=> t.className="toast",2500);
}

// ================= REKAP =================
function lihatRekap(){
  window.open("https://yanuar-moga.github.io/guruwali/bendahara_kelas/cek_iuran","_blank");
}

// ================= INIT =================
window.onload = ()=>{
  loadSiswa();
  cekLogin();
}

</script>

</body>
</html>
