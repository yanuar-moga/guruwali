<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kas Kelas</title>

<style>
*{box-sizing:border-box;}
body{font-family:'Segoe UI';background:#0f172a;color:#fff;margin:0;padding:20px;}
.container{max-width:420px;margin:auto;}
.card{background:#1e293b;padding:20px;border-radius:16px;margin-bottom:15px;}
h2{text-align:center;}
input,select{
width:100%;padding:12px;margin-top:5px;
border-radius:10px;border:none;background:#334155;color:white;
}
button{
width:100%;padding:14px;margin-top:10px;
border:none;border-radius:12px;font-weight:bold;color:white;
}
.btn-login{background:#f59e0b;}
.btn-simpan{background:#22c55e;}
</style>
</head>

<body>

<div class="container">

<div class="card" id="loginCard">
<h2>🔐 Login</h2>
<input type="password" id="pin" placeholder="PIN">
<button class="btn-login" onclick="login()">Login</button>
</div>

<div class="card" id="formCard" style="display:none;">
<h2>💰 Input Iuran</h2>

<select id="nama"></select>

<div id="formIuran"></div>

<button class="btn-simpan" onclick="kirim()">Simpan</button>
</div>

</div>

<script>

const URL = "https://script.google.com/macros/s/AKfycbwQ0v3rev6JV1ubaV6E2aGNgN7Ji4uuQxAcs4xsBSuWGKwEsPftfYhwNKf6aY9KYlRkVw/exec";

let currentPIN="";
let jenisList=[];

// ================= LOGIN =================
async function login(){

  let pin = document.getElementById("pin").value;

  let res = await fetch(URL,{
    method:"POST",
    body: JSON.stringify({jenis:"TEST", pin})
  });

  let r = await res.json();

  if(r.status==="error"){
    alert("PIN salah");
    return;
  }

  currentPIN = pin;

  document.getElementById("loginCard").style.display="none";
  document.getElementById("formCard").style.display="block";

  load();
}

// ================= LOAD =================
async function load(){

  // ambil siswa
  let s = await fetch(URL);
  let siswa = await s.json();

  let select = document.getElementById("nama");
  select.innerHTML="<option>-- pilih --</option>";

  siswa.forEach(n=>{
    select.innerHTML += `<option>${n}</option>`;
  });

  // ambil jenis dari REKAP
  let r = await fetch(URL+"?mode=rekap");
  let data = await r.json();

  if(data.length){
    jenisList = Object.keys(data[0].dynamic || {});
    buatForm();
  }
}

// ================= FORM DINAMIS =================
function buatForm(){

  let html="";

  jenisList.forEach(j=>{
    html += `
      <div>
        <label>${j}</label>
        <input type="number" id="${j}">
      </div>
    `;
  });

  document.getElementById("formIuran").innerHTML = html;
}

// ================= KIRIM =================
function kirim(){

  let nama = document.getElementById("nama").value;

  if(!nama){
    alert("Pilih siswa");
    return;
  }

  let req=[];

  jenisList.forEach(j=>{
    let val = document.getElementById(j).value;

    if(val){
      req.push(fetch(URL,{
        method:"POST",
        body: JSON.stringify({
          nama,
          jenis:j,
          jumlah:val,
          pin:currentPIN
        })
      }));
    }
  });

  Promise.all(req).then(()=>{
    alert("Berhasil");
  });
}

</script>

</body>
</html>
